<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Check-In Eolie</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  font-family:Arial;
  text-align:center;
  padding:20px;
  background:white;
}

h1{
  font-size:42px;
}

#reader{
  max-width:500px;
  margin:auto;
}

#esito{
  font-size:44px;
  font-weight:bold;
  margin-top:20px;
}

#dettagli{
  font-size:24px;
}

button{
  font-size:28px;
  padding:18px;
  width:90%;
  border-radius:12px;
  border:1px solid #aaa;
}
</style>
</head>

<body>

<h1>CHECK-IN EOLIE</h1>

<div id="reader"></div>

<h1 id="esito">SCANNER ATTIVO</h1>
<p id="dettagli"></p>

<button onclick="riavvia()" id="btn" style="display:none;">
SCANSIONA ANCORA
</button>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyMqWkwY5AwMRV46eHsKdppn9xF8goSAZDhWJHiYlpQnVnZJ6m9oIVSdIIasryOtH6T5w/exec";

let scanner;
let bloccato = false;
let audioCtx = null;

function preparaAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === "suspended") {
    audioCtx.resume();
  }
}

function beep(freq, durata) {
  preparaAudio();

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.frequency.value = freq;
  gain.gain.value = 0.25;

  osc.start();
  osc.stop(audioCtx.currentTime + durata / 1000);
}

function beepValido() {
  beep(1200, 150);
}

function beepGiaUsato() {
  beep(1000, 120);
  setTimeout(function() {
    beep(1000, 120);
  }, 220);
}

function beepErrore() {
  beep(400, 700);
}

function mostra(testo, colore, dettagli = "") {
  document.body.style.background = colore;
  document.getElementById("esito").innerHTML = testo;
  document.getElementById("dettagli").innerHTML = dettagli;
  document.getElementById("btn").style.display = "none";

  riavviaAutomatico();
}

function verifica(codice) {
  preparaAudio();

  if (bloccato) return;
  bloccato = true;

  document.body.style.background = "white";
  document.getElementById("esito").innerHTML = "CONTROLLO...";
  document.getElementById("dettagli").innerHTML = codice;

  if (scanner) {
    scanner.clear();
  }

  const callbackName = "riceviRisposta_" + Date.now();

  window[callbackName] = function(d) {

    delete window[callbackName];

    if (d.esito === "VALIDO") {
      beepValido();
      mostra(
        "✅ IMBARCO OK",
        "#00c853",
        "Ticket: " + (d.ticket || "") + "<br>" +
        "Nome: " + (d.nome || "") + " " + (d.cognome || "") + "<br>" +
        "Corsa: " + (d.corsa || "")
      );
      return;
    }

    if (d.esito === "ANNULLATO") {
      beepErrore();
      mostra("❌ BIGLIETTO ANNULLATO", "#ff1744");
      return;
    }

    if (d.esito === "GIA_USATO") {
      beepGiaUsato();
      mostra("⚠️ GIÀ UTILIZZATO", "#ffd600");
      return;
    }

    if (d.esito === "NO_CODICE") {
      beepErrore();
      mostra("❌ CODICE MANCANTE", "#ff1744");
      return;
    }

    beepErrore();
    mostra("❌ NON TROVATO", "#ff1744");
  };

  const script = document.createElement("script");
  script.src = API_URL
    + "?codice=" + encodeURIComponent(codice)
    + "&callback=" + callbackName;

  script.onerror = function() {
    beepErrore();
    mostra("❌ ERRORE COLLEGAMENTO", "#ff1744", "Apps Script non raggiungibile");
  };

  document.body.appendChild(script);
}

function avviaScanner() {
  document.body.style.background = "white";
  document.getElementById("esito").innerHTML = "SCANNER ATTIVO";
  document.getElementById("dettagli").innerHTML = "";
  document.getElementById("btn").style.display = "none";
  document.getElementById("reader").innerHTML = "";
  bloccato = false;

  scanner = new Html5QrcodeScanner("reader", {
    fps: 10,
    qrbox: 250
  });

  scanner.render(function(decodedText) {
    verifica(decodedText);
  });
}

function riavviaAutomatico() {
  setTimeout(function() {
    avviaScanner();
  }, 2000);
}

function riavvia() {
  avviaScanner();
}

avviaScanner();
</script>

</body>
</html>
