<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Check-In Eolie</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  font-family:Arial;
  text-align:center;
  padding:20px;
  background:white;
}

h1{ font-size:42px; }

#reader{
  max-width:500px;
  margin:auto;
}

#esito{
  font-size:44px;
  font-weight:bold;
  margin-top:20px;
}

#dettagli{
  font-size:30px;
  font-weight:bold;
  line-height:1.4;
}

.nomeGrande{ font-size:42px; font-weight:bold; }
.info{ font-size:26px; font-weight:normal; }

input, button, select{
  font-size:24px;
  padding:15px;
  width:90%;
  border-radius:12px;
  border:1px solid #aaa;
  margin:8px;
}

#statsBox{
  background:#f5f5f5;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  font-size:20px;
  display:none;
}

#app{ display:none; }

#manualBox{
  display:none;
  background:#f0f0f0;
  padding:12px;
  border-radius:12px;
  margin-bottom:12px;
}

#menuOperazioni{
  display:none;
}

#listaBox{
  display:none;
  background:white;
  border:2px solid #333;
  border-radius:12px;
  padding:15px;
  margin-top:15px;
  text-align:left;
  font-size:22px;
}

#listaBox h2{
  text-align:center;
}

.rigaLista{
  padding:8px;
  border-bottom:1px solid #ddd;
}

#annullaBox{
  display:none;
  background:#fff8e1;
  border:2px solid #ff9800;
  border-radius:12px;
  padding:15px;
  margin-top:15px;
  font-size:22px;
}

#annullaDettagli{
  font-size:26px;
  font-weight:bold;
  line-height:1.4;
}
</style>
</head>

<body>

<div id="login">
  <h1>CHECK-IN EOLIE</h1>
  <input id="password" type="password" placeholder="Password">
  <button onclick="accedi()">ACCEDI</button>
  <h2 id="erroreLogin"></h2>
</div>

<div id="app">

<h1>CHECK-IN EOLIE</h1>

<div id="statsBox">
  <b>📊 STATISTICHE LIVE</b><br>
  Totale: <span id="totale">0</span> |
  Imbarcati: <span id="imbarcati">0</span> |
  Mancanti: <span id="mancanti">0</span> |
  Annullati: <span id="annullati">0</span>
</div>

<input id="operatore" placeholder="Nome operatore">
<select id="corsa">
  <option value="">Caricamento corse...</option>
</select>

<button onclick="iniziaCheckin()" id="startBtn">INIZIA CHECK-IN</button>

<div id="manualBox">
  <input id="codiceManuale" placeholder="Inserisci ticket manualmente">
  <button onclick="verificaManuale()">VERIFICA MANUALE</button>
</div>

<button onclick="toggleMenu()" id="menuBtn" style="display:none;">
☰ MENU
</button>

<div id="menuOperazioni">

<button onclick="mostraReport()">
📄 REPORT FINE CORSA
</button>

<button onclick="mostraLista('imbarcati')">
✅ LISTA IMBARCATI
</button>

<button onclick="mostraLista('mancanti')">
⏳ LISTA MANCANTI
</button>

<button onclick="apriAnnullaCheckin()">
↩️ ANNULLA CHECK-IN
</button>

<button onclick="terminaCorsa()" style="background:#333;color:white;">
🛑 TERMINA CORSA
</button>

</div>

<div id="reader" style="display:none;"></div>

<h1 id="esito">INSERISCI OPERATORE E CORSA</h1>
<p id="dettagli"></p>

<div id="listaBox"></div>

<div id="annullaBox">
  <h2>↩️ ANNULLA CHECK-IN</h2>
  <input id="ticketAnnulla" placeholder="Inserisci numero ticket">
  <button onclick="cercaTicketAnnulla()">CERCA TICKET</button>
  <div id="annullaDettagli"></div>
  <button id="confermaAnnullaBtn"
          onclick="confermaAnnullaCheckin()"
          style="display:none;background:#ff9800;color:white;">
  CONFERMA ANNULLAMENTO
  </button>
  <button onclick="chiudiAnnullaBox()">INDIETRO</button>
</div>

<button id="nuovaCorsaBtn"
        onclick="nuovaCorsa()"
        style="display:none;background:#2196f3;color:white;">
🔄 NUOVA CORSA
</button>

</div>

<script>
const PASSWORD = "brunoabbondanza";

const API_URL = "https://script.google.com/macros/s/AKfycbyMqWkwY5AwMRV46eHsKdppn9xF8goSAZDhWJHiYlpQnVnZJ6m9oIVSdIIasryOtH6T5w/exec";

let scanner;
let bloccato = false;
let corsaChiusa = false;
let audioCtx = null;
let corsaAttiva = "";
let operatoreAttivo = "";
let ultimoReport = null;
let timerStats = null;
let timerRiavvio = null;
let ticketDaAnnullare = "";

function toggleMenu() {
  const menu = document.getElementById("menuOperazioni");

  if (menu.style.display === "none" || menu.style.display === "") {
    menu.style.display = "block";
  } else {
    menu.style.display = "none";
  }
}

function caricaCorse() {
  const callbackName = "corse_" + Date.now();

  window[callbackName] = function(d) {
    delete window[callbackName];

    const select = document.getElementById("corsa");
    select.innerHTML = "";

    if (!d || d.esito !== "CORSE" || !d.corse || d.corse.length === 0) {
      const opt = document.createElement("option");
      opt.value = "";
      opt.textContent = "Nessuna corsa trovata";
      select.appendChild(opt);
      return;
    }

    const prima = document.createElement("option");
    prima.value = "";
    prima.textContent = "Seleziona corsa";
    select.appendChild(prima);

    for (let i = 0; i < d.corse.length; i++) {
      const opt = document.createElement("option");
      opt.value = d.corse[i].corsa;
      opt.textContent = d.corse[i].label;
      select.appendChild(opt);
    }
  };

  const script = document.createElement("script");
  script.src = API_URL + "?azione=corse&callback=" + callbackName;
  document.body.appendChild(script);
}

function accedi() {
  const p = document.getElementById("password").value;

  if (p === PASSWORD) {
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
    caricaCorse();
  } else {
    document.getElementById("erroreLogin").innerHTML = "❌ PASSWORD ERRATA";
    document.getElementById("erroreLogin").style.color = "red";
  }
}

function preparaAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === "suspended") audioCtx.resume();
}

function beep(freq, durata) {
  preparaAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.frequency.value = freq;
  gain.gain.value = 0.25;
  osc.start();
  osc.stop(audioCtx.currentTime + durata / 1000);
}

function beepValido(){ beep(1200,150); }

function beepGiaUsato(){
  beep(1000,120);
  setTimeout(function(){ beep(1000,120); },220);
}

function beepErrore(){ beep(400,700); }

function iniziaCheckin() {
  operatoreAttivo = document.getElementById("operatore").value.trim();
  corsaAttiva = document.getElementById("corsa").value.trim();

  if (operatoreAttivo === "") {
    alert("Inserisci il nome operatore");
    return;
  }

  if (corsaAttiva === "") {
    alert("Seleziona prima la corsa");
    return;
  }

  preparaAudio();

  document.getElementById("operatore").style.display = "none";
  document.getElementById("corsa").style.display = "none";
  document.getElementById("startBtn").style.display = "none";

  document.getElementById("manualBox").style.display = "block";
  document.getElementById("menuBtn").style.display = "inline-block";
  document.getElementById("reader").style.display = "block";

  aggiornaStatistiche();

  if (timerStats) clearInterval(timerStats);

  timerStats = setInterval(function(){
    aggiornaStatistiche();
  }, 10000);

  avviaScanner();
}

function mostra(testo, colore, dettagli = "") {
  document.body.style.background = colore;
  document.getElementById("esito").innerHTML = testo;
  document.getElementById("dettagli").innerHTML = dettagli;

  document.getElementById("listaBox").style.display = "none";
  document.getElementById("annullaBox").style.display = "none";

  riavviaAutomatico();
}

function aggiornaStatistiche() {
  if (corsaAttiva === "") return;

  const callbackName = "stats_" + Date.now();

  window[callbackName] = function(d) {
    delete window[callbackName];

    if (d.esito !== "STATS") return;

    ultimoReport = d;

    document.getElementById("statsBox").style.display = "block";
    document.getElementById("totale").innerHTML = d.totale;
    document.getElementById("imbarcati").innerHTML = d.imbarcati;
    document.getElementById("mancanti").innerHTML = d.mancanti;
    document.getElementById("annullati").innerHTML = d.annullati;
  };

  const script = document.createElement("script");

  script.src =
    API_URL +
    "?azione=stats" +
    "&corsa=" + encodeURIComponent(corsaAttiva) +
    "&callback=" + callbackName;

  document.body.appendChild(script);
}

function creaTestoReport() {
  if (!ultimoReport) {
    return "Statistiche non disponibili";
  }

  let testo =
    "🚢 REPORT FINE CORSA\n\n" +
    "Corsa: " + ultimoReport.corsa + "\n\n" +
    "Totale Passeggeri: " + ultimoReport.totale + "\n" +
    "Imbarcati: " + ultimoReport.imbarcati + "\n" +
    "Mancanti: " + ultimoReport.mancanti + "\n" +
    "Annullati: " + ultimoReport.annullati + "\n\n";

  testo += "Operatori:\n";

  for (const op in ultimoReport.operatori) {
    testo += op + ": " + ultimoReport.operatori[op] + " pax\n";
  }

  return testo;
}

function mostraReport() {
  aggiornaStatistiche();

  setTimeout(function() {
    alert(creaTestoReport());
  }, 500);
}

function verificaManuale() {
  if (corsaChiusa) return;

  const codice = document.getElementById("codiceManuale").value.trim();

  if (codice === "") {
    alert("Inserisci un codice ticket");
    return;
  }

  document.getElementById("codiceManuale").value = "";
  verifica(codice);
}

function mostraLista(tipo) {
  if (corsaAttiva === "") {
    alert("Corsa non selezionata");
    return;
  }

  const callbackName = "lista_" + Date.now();

  window[callbackName] = function(d) {
    delete window[callbackName];

    if (d.esito !== "LISTA") {
      alert("Lista non disponibile");
      return;
    }

    let titolo = tipo === "imbarcati" ? "✅ LISTA IMBARCATI" : "⏳ LISTA MANCANTI";

    let html = "<h2>" + titolo + "</h2>";
    html += "<p style='text-align:center'><b>Corsa:</b> " + corsaAttiva + "</p>";

    if (!d.lista || d.lista.length === 0) {
      html += "<p style='text-align:center'>Nessun passeggero presente.</p>";
    } else {
      for (let i = 0; i < d.lista.length; i++) {
        const r = d.lista[i];

        html +=
          "<div class='rigaLista'>" +
          (r.nome || "") + " " + (r.cognome || "") +
          " - " + (r.pax || 0) + " pax" +
          " - Ticket " + (r.ticket || "") +
          "</div>";
      }
    }

    document.getElementById("listaBox").innerHTML = html;
    document.getElementById("listaBox").style.display = "block";
  };

  const script = document.createElement("script");

  script.src =
    API_URL +
    "?azione=lista" +
    "&tipo=" + encodeURIComponent(tipo) +
    "&corsa=" + encodeURIComponent(corsaAttiva) +
    "&callback=" + callbackName;

  document.body.appendChild(script);
}


function apriAnnullaCheckin() {
  if (corsaChiusa) return;

  if (scanner) {
    scanner.clear();
  }

  bloccato = true;
  ticketDaAnnullare = "";

  document.body.style.background = "white";
  document.getElementById("menuOperazioni").style.display = "none";
  document.getElementById("listaBox").style.display = "none";
  document.getElementById("reader").innerHTML = "";
  document.getElementById("annullaBox").style.display = "block";
  document.getElementById("ticketAnnulla").value = "";
  document.getElementById("annullaDettagli").innerHTML = "";
  document.getElementById("confermaAnnullaBtn").style.display = "none";

  document.getElementById("esito").innerHTML = "↩️ ANNULLA CHECK-IN";
  document.getElementById("dettagli").innerHTML =
    "Inserisci il numero ticket da riportare nei mancanti";
}

function chiudiAnnullaBox() {
  ticketDaAnnullare = "";

  document.getElementById("annullaBox").style.display = "none";
  document.getElementById("annullaDettagli").innerHTML = "";
  document.getElementById("confermaAnnullaBtn").style.display = "none";

  avviaScanner();
}

function cercaTicketAnnulla() {
  const ticket = document.getElementById("ticketAnnulla").value.trim();

  if (ticket === "") {
    alert("Inserisci il numero ticket");
    return;
  }

  const callbackName = "trova_" + Date.now();

  window[callbackName] = function(d) {
    delete window[callbackName];

    if (d.esito === "TROVATO") {
      ticketDaAnnullare = d.ticket;

      document.getElementById("annullaDettagli").innerHTML =
        "⚠️ CONFERMA ANNULLAMENTO<br><br>" +
        "<span class='nomeGrande'>" + (d.nome || "") + " " + (d.cognome || "") + "</span><br>" +
        "<span class='info'>Passeggeri: " + (d.pax || "") + "</span><br>" +
        "<span class='info'>Ticket: " + (d.ticket || "") + "</span><br>" +
        "<span class='info'>Corsa: " + (d.corsa || "") + "</span>";

      document.getElementById("confermaAnnullaBtn").style.display = "inline-block";
      return;
    }

    ticketDaAnnullare = "";
    document.getElementById("confermaAnnullaBtn").style.display = "none";

    if (d.esito === "NON_IMBARCATO") {
      document.getElementById("annullaDettagli").innerHTML =
        "❌ TICKET NON RISULTA IMBARCATO<br><br>" +
        (d.nome || "") + " " + (d.cognome || "") + "<br>" +
        "Pax: " + (d.pax || "") + "<br>" +
        "Ticket: " + (d.ticket || "");
      return;
    }

    if (d.esito === "ALTRA_CORSA") {
      document.getElementById("annullaDettagli").innerHTML =
        "❌ TICKET DI ALTRA CORSA<br><br>" +
        "Corsa biglietto: " + (d.corsa || "") + "<br>" +
        "Corsa selezionata: " + corsaAttiva;
      return;
    }

    if (d.esito === "ANNULLATO") {
      document.getElementById("annullaDettagli").innerHTML =
        "❌ BIGLIETTO ANNULLATO";
      return;
    }

    document.getElementById("annullaDettagli").innerHTML =
      "❌ TICKET NON TROVATO";
  };

  const script = document.createElement("script");
  script.src = API_URL
    + "?azione=trovaTicket"
    + "&ticket=" + encodeURIComponent(ticket)
    + "&corsa=" + encodeURIComponent(corsaAttiva)
    + "&callback=" + callbackName;

  document.body.appendChild(script);
}

function confermaAnnullaCheckin() {
  if (ticketDaAnnullare === "") {
    alert("Nessun ticket selezionato");
    return;
  }

  if (!confirm("Confermi annullamento check-in del ticket " + ticketDaAnnullare + " ?")) {
    return;
  }

  const callbackName = "annulla_" + Date.now();

  window[callbackName] = function(d) {
    delete window[callbackName];

    if (d.esito === "CHECKIN_ANNULLATO") {
      beepValido();
      aggiornaStatistiche();

      document.getElementById("annullaBox").style.display = "none";

      mostra(
        "✅ CHECK-IN ANNULLATO",
        "#00c853",
        "<span class='nomeGrande'>" + (d.nome || "") + " " + (d.cognome || "") + "</span><br>" +
        "<span class='info'>Passeggeri: " + (d.pax || "") + "</span><br>" +
        "<span class='info'>Ticket: " + (d.ticket || "") + "</span><br>" +
        "<span class='info'>Corsa: " + (d.corsa || "") + "</span>"
      );

      ticketDaAnnullare = "";
      return;
    }

    beepErrore();
    document.getElementById("annullaDettagli").innerHTML =
      "❌ IMPOSSIBILE ANNULLARE IL CHECK-IN";
  };

  const script = document.createElement("script");
  script.src = API_URL
    + "?azione=annullaCheckin"
    + "&ticket=" + encodeURIComponent(ticketDaAnnullare)
    + "&corsa=" + encodeURIComponent(corsaAttiva)
    + "&callback=" + callbackName;

  document.body.appendChild(script);
}


function terminaCorsa() {
  if (!confirm("Terminare la corsa " + corsaAttiva + " ?")) {
    return;
  }

  corsaChiusa = true;
  bloccato = true;

  if (timerRiavvio) clearTimeout(timerRiavvio);
  if (timerStats) clearInterval(timerStats);

  aggiornaStatistiche();

  setTimeout(function() {
    alert(creaTestoReport());

    if (scanner) {
      scanner.clear();
    }

    document.getElementById("reader").innerHTML = "";
    document.getElementById("reader").style.display = "none";
    document.getElementById("manualBox").style.display = "none";
    document.getElementById("menuBtn").style.display = "none";
    document.getElementById("menuOperazioni").style.display = "none";
    document.getElementById("listaBox").style.display = "none";
    document.getElementById("annullaBox").style.display = "none";
    document.getElementById("nuovaCorsaBtn").style.display = "inline-block";

    document.body.style.background = "#e0e0e0";

    document.getElementById("esito").innerHTML = "🛑 CORSA CHIUSA";
    document.getElementById("dettagli").innerHTML =
      corsaAttiva + "<br><br>" +
      "Imbarcati: " + (ultimoReport ? ultimoReport.imbarcati : "") + "<br>" +
      "Mancanti: " + (ultimoReport ? ultimoReport.mancanti : "") + "<br>" +
      "Annullati: " + (ultimoReport ? ultimoReport.annullati : "");
  }, 700);
}


function nuovaCorsa() {

  corsaChiusa = false;
  bloccato = false;
  ultimoReport = null;

  if (timerRiavvio) clearTimeout(timerRiavvio);
  if (timerStats) clearInterval(timerStats);

  document.body.style.background = "white";

  document.getElementById("operatore").style.display = "block";
  document.getElementById("corsa").style.display = "block";
  document.getElementById("startBtn").style.display = "inline-block";

  document.getElementById("manualBox").style.display = "none";
  document.getElementById("menuBtn").style.display = "none";
  document.getElementById("menuOperazioni").style.display = "none";
  document.getElementById("reader").style.display = "none";
  document.getElementById("statsBox").style.display = "none";
  document.getElementById("listaBox").style.display = "none";
  document.getElementById("annullaBox").style.display = "none";
  document.getElementById("nuovaCorsaBtn").style.display = "none";

  document.getElementById("codiceManuale").value = "";
  document.getElementById("operatore").value = "";
  document.getElementById("corsa").value = "";

  document.getElementById("esito").innerHTML =
    "INSERISCI OPERATORE E CORSA";

  document.getElementById("dettagli").innerHTML = "";

  caricaCorse();
}

function verifica(codice) {
  if (corsaChiusa) return;

  preparaAudio();

  if (bloccato) return;
  bloccato = true;

  document.body.style.background = "white";
  document.getElementById("esito").innerHTML = "CONTROLLO...";
  document.getElementById("dettagli").innerHTML = codice;
  document.getElementById("listaBox").style.display = "none";
  document.getElementById("annullaBox").style.display = "none";

  if (scanner) scanner.clear();

  const callbackName = "riceviRisposta_" + Date.now();

  window[callbackName] = function(d) {
    delete window[callbackName];

    if (d.esito === "VALIDO") {
      beepValido();
      aggiornaStatistiche();

      mostra(
        "✅ IMBARCO OK",
        "#00c853",
        "<span class='nomeGrande'>" + (d.nome || "") + " " + (d.cognome || "") + "</span><br>" +
        "<span class='info'>Pax: " + (d.pax || "") + "</span><br>" +
        "<span class='info'>Ticket: " + (d.ticket || "") + "</span><br>" +
        "<span class='info'>Corsa: " + (d.corsa || "") + "</span><br>" +
        "<span class='info'>Operatore: " + operatoreAttivo + "</span>"
      );
      return;
    }

    if (d.esito === "ALTRA_CORSA") {
      beepErrore();
      mostra(
        "❌ ALTRA CORSA",
        "#ff1744",
        "Corsa biglietto: " + (d.corsa || "") + "<br>" +
        "Corsa selezionata: " + corsaAttiva
      );
      return;
    }

    if (d.esito === "ANNULLATO") {
      beepErrore();
      mostra("❌ BIGLIETTO ANNULLATO", "#ff1744");
      return;
    }

    if (d.esito === "GIA_USATO") {
      beepGiaUsato();
      mostra("⚠️ GIÀ UTILIZZATO", "#ffd600");
      return;
    }

    if (d.esito === "NO_CODICE") {
      beepErrore();
      mostra("❌ CODICE MANCANTE", "#ff1744");
      return;
    }

    beepErrore();
    mostra("❌ NON TROVATO", "#ff1744");
  };

  const script = document.createElement("script");
  script.src = API_URL
    + "?codice=" + encodeURIComponent(codice)
    + "&corsa=" + encodeURIComponent(corsaAttiva)
    + "&operatore=" + encodeURIComponent(operatoreAttivo)
    + "&callback=" + callbackName;

  script.onerror = function() {
    beepErrore();
    mostra("❌ ERRORE COLLEGAMENTO", "#ff1744", "Apps Script non raggiungibile");
  };

  document.body.appendChild(script);
}

function avviaScanner() {
  if (corsaChiusa) return;

  document.body.style.background = "white";

  document.getElementById("esito").innerHTML =
    "SCANNER ATTIVO<br><small>" + corsaAttiva + "</small><br><small>Operatore: " + operatoreAttivo + "</small>";

  document.getElementById("dettagli").innerHTML = "";
  document.getElementById("reader").innerHTML = "";
  bloccato = false;

  scanner = new Html5QrcodeScanner("reader", {
    fps: 10,
    qrbox: 250
  });

  scanner.render(function(decodedText) {
    verifica(decodedText);
  });
}

function riavviaAutomatico() {
  if (corsaChiusa) return;

  timerRiavvio = setTimeout(function() {
    aggiornaStatistiche();
    avviaScanner();
  }, 2000);
}
</script>

</body>
</html>
