<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Check-In Eolie</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root{
  --navy:#073763;
  --blue:#0d6efd;
  --deep:#062b4f;
  --light:#f4f8fb;
  --card:#ffffff;
  --green:#00c853;
  --red:#ff1744;
  --yellow:#ffd600;
  --gray:#e9eef3;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html, body{
  width:100%;
  max-width:100%;
  overflow-x:hidden;
  -webkit-text-size-adjust:100%;
}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  text-align:center;
  padding:14px;
  background:#f4f8fb;
  color:#102030;
  touch-action:manipulation;
  overscroll-behavior:none;
}

.header{
  background:white;
  color:#111;
  padding:18px 14px;
  border-radius:22px;
  margin-bottom:14px;
  box-shadow:0 8px 20px rgba(0,0,0,0.12);
}

.headerTitle{
  font-size:34px;
  font-weight:900;
  letter-spacing:0.5px;
  color:#111;
}

.subtitle{
  font-size:16px;
  color:#666;
  margin-top:5px;
}

.panel{
  background:var(--card);
  border-radius:22px;
  padding:16px;
  margin:12px auto;
  max-width:620px;
  box-shadow:0 8px 25px rgba(0,0,0,0.12);
}

#login{
  max-width:520px;
  margin:40px auto 0 auto;
}

#app{
  display:none;
  max-width:720px;
  margin:0 auto;
}

h1{
  font-size:34px;
  margin:14px 0;
}

#reader{
  max-width:520px;
  margin:14px auto;
  border:4px solid var(--blue);
  border-radius:22px;
  overflow:hidden;
  background:white;
  padding:8px;
  box-shadow:0 8px 20px rgba(13,110,253,0.20);
}

#esito{
  font-size:38px;
  font-weight:900;
  margin:14px 0 8px 0;
  line-height:1.15;
}

#dettagli{
  font-size:28px;
  font-weight:bold;
  line-height:1.35;
  margin:10px 0;
}

.nomeGrande{
  font-size:40px;
  font-weight:900;
}

.info{
  font-size:25px;
  font-weight:normal;
}

input, button, select{
  font-size:22px;
  padding:15px;
  width:92%;
  border-radius:16px;
  border:1px solid #cfd8dc;
  margin:8px;
  outline:none;
}

input, select{
  background:white;
  color:#102030;
}

button{
  background:var(--blue);
  color:white;
  border:none;
  font-weight:900;
  box-shadow:0 5px 12px rgba(0,0,0,0.18);
}

button:active{
  transform:scale(0.98);
}

#startBtn{
  background:var(--green);
  color:#062b20;
}

#menuBtn{
  background:var(--deep);
}

#nuovaCorsaBtn{
  background:#2196f3!important;
  color:white!important;
}

#statsBox{
  display:none;
  background:transparent;
  padding:0;
  margin:12px auto;
  max-width:620px;
}

.statsTitle{
  color:#111;
  font-weight:900;
  margin-bottom:8px;
}

.statsGrid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}

.statCard{
  background:white;
  border-radius:16px;
  padding:10px 6px;
  box-shadow:0 5px 14px rgba(0,0,0,0.12);
}

.statNumber{
  display:block;
  font-size:30px;
  font-weight:900;
  color:var(--navy);
}

.statLabel{
  display:block;
  font-size:13px;
  font-weight:bold;
  color:#607d8b;
  margin-top:3px;
}

.statCard{
  cursor:pointer;
}

#dettaglioStatsBox{
  display:none;
  background:white;
  border:2px solid var(--navy);
  border-radius:22px;
  padding:18px;
  margin:15px auto;
  max-width:620px;
  text-align:center;
  font-size:22px;
  box-shadow:0 8px 22px rgba(0,0,0,0.12);
}

#dettaglioStatsBox h2{
  color:var(--navy);
  margin-top:0;
}

.dettaglioGrid{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
  margin-top:12px;
}

.dettaglioRiga{
  background:#eef3ff;
  border-radius:16px;
  padding:14px;
  font-size:24px;
  font-weight:900;
}

.dettaglioRiga span{
  display:block;
  font-size:16px;
  color:#607d8b;
  margin-bottom:4px;
}

#tornaStatsBtn{
  display:none;
  background:#333!important;
  color:white!important;
}



#storicoBox{
  display:none;
  background:white;
  border:2px solid var(--navy);
  border-radius:22px;
  padding:15px;
  margin:15px auto;
  max-width:620px;
  text-align:left;
  font-size:18px;
  box-shadow:0 8px 22px rgba(0,0,0,0.12);
}

#storicoBox h2{
  text-align:center;
  color:var(--navy);
}

.storicoCard{
  background:#eef3ff;
  border-radius:16px;
  padding:12px;
  margin:10px 0;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.storicoTitolo{
  font-size:21px;
  font-weight:900;
  color:var(--navy);
}

.storicoDettagli{
  font-size:17px;
  line-height:1.45;
  margin-top:8px;
}

.storicoCard button{
  width:100%;
  margin:8px 0 0 0;
  background:#b00020!important;
  color:white!important;
}

#tornaStoricoBtn{
  display:none;
  background:#333!important;
  color:white!important;
}

#manualBox{
  display:none;
  background:white;
  padding:12px;
  border-radius:22px;
  margin:12px auto;
  max-width:620px;
  box-shadow:0 8px 22px rgba(0,0,0,0.12);
}

#menuOperazioni{
  display:none;
  background:white;
  border-radius:22px;
  padding:12px;
  margin:12px auto;
  max-width:620px;
  box-shadow:0 8px 22px rgba(0,0,0,0.12);
}

#menuOperazioni button{
  display:block;
  margin:9px auto;
  background:#0d47a1;
}

#menuOperazioni button:last-child{
  background:#333!important;
  color:white!important;
}

#listaBox{
  display:none;
  background:white;
  border:2px solid var(--navy);
  border-radius:22px;
  padding:15px;
  margin:15px auto;
  max-width:620px;
  text-align:left;
  font-size:21px;
  box-shadow:0 8px 22px rgba(0,0,0,0.12);
}

#listaBox h2{
  text-align:center;
  color:var(--navy);
}

.rigaLista{
  padding:10px;
  border-bottom:1px solid #ddd;
}

#annullaBox{
  display:none;
  background:#fff8e1;
  border:2px solid #ff9800;
  border-radius:22px;
  padding:15px;
  margin:15px auto;
  max-width:620px;
  font-size:22px;
  box-shadow:0 8px 22px rgba(0,0,0,0.12);
}

#annullaBox h2{
  color:#e65100;
}

#annullaDettagli{
  font-size:25px;
  font-weight:bold;
  line-height:1.35;
}

#confermaAnnullaBtn{
  background:#ff9800!important;
  color:white!important;
}

#erroreLogin{
  color:#ff1744;
  font-size:24px;
}

@media(max-width:420px){

<body>

<script>

// Blocco zoom iPhone: doppio tap, pinch e gesture Safari
let ultimoTapZoom = 0;
document.addEventListener('touchend', function(e) {
  const ora = Date.now();
  if (ora - ultimoTapZoom <= 300) {
    e.preventDefault();
  }
  ultimoTapZoom = ora;
}, { passive:false });

document.addEventListener('touchmove', function(e) {
  if (e.touches && e.touches.length > 1) {
    e.preventDefault();
  }
}, { passive:false });

document.addEventListener('gesturestart', function(e) {
  e.preventDefault();
});

document.addEventListener('gesturechange', function(e) {
  e.preventDefault();
});

document.addEventListener('gestureend', function(e) {
  e.preventDefault();
});

const PASSWORD = "brunoabbondanza";

const API_URL = "https://script.google.com/macros/s/AKfycbyMqWkwY5AwMRV46eHsKdppn9xF8goSAZDhWJHiYlpQnVnZJ6m9oIVSdIIasryOtH6T5w/exec";

let scanner;
let bloccato = false;
let corsaChiusa = false;
let audioCtx = null;
let corsaAttiva = "";
let portoCheckinAttivo = "";
let operatoreAttivo = "";
let ultimoReport = null;
let timerStats = null;
let timerRiavvio = null;
let ticketDaAnnullare = "";

function toggleMenu() {
  const menu = document.getElementById("menuOperazioni");

  if (menu.style.display === "none" || menu.style.display === "") {
    menu.style.display = "block";
  } else {
    menu.style.display = "none";
  }
}

function caricaCorse() {
  const callbackName = "corse_" + Date.now();

  window[callbackName] = function(d) {
    delete window[callbackName];

    const select = document.getElementById("corsa");
    select.innerHTML = "";

    if (!d || d.esito !== "CORSE" || !d.corse || d.corse.length === 0) {
      const opt = document.createElement("option");
      opt.value = "";
      opt.textContent = "Nessuna corsa trovata";
      select.appendChild(opt);
      return;
    }

    const prima = document.createElement("option");
    prima.value = "";
    prima.textContent = "Seleziona corsa";
    select.appendChild(prima);

    for (let i = 0; i < d.corse.length; i++) {
      const opt = document.createElement("option");
      opt.value = d.corse[i].corsa;
      opt.textContent = d.corse[i].label;
      select.appendChild(opt);
    }
  };

  const script = document.createElement("script");
  script.src = API_URL + "?azione=corse&callback=" + callbackName;
  document.body.appendChild(script);
}


function caricaPortiCheckin() {
  const selectPorto = document.getElementById("portoCheckin");
  const corsaSel = document.getElementById("corsa").value.trim();

  selectPorto.innerHTML = "<option value=''>Seleziona porto check-in</option>";

  if (corsaSel === "") return;

  chiamaApi({
    azione: "portiCheckin",
    corsa: corsaSel
  }, function(d) {
    selectPorto.innerHTML = "<option value=''>Seleziona porto check-in</option>";

    if (!d || d.esito !== "PORTI" || !d.porti || d.porti.length === 0) {
      const opt = document.createElement("option");
      opt.value = "";
      opt.textContent = "Nessun porto trovato";
      selectPorto.appendChild(opt);
      return;
    }

    for (let i = 0; i < d.porti.length; i++) {
      const opt = document.createElement("option");
      opt.value = d.porti[i];
      opt.textContent = d.porti[i];
      selectPorto.appendChild(opt);
    }
  });
}

function accedi() {
  const p = document.getElementById("password").value;

  if (p === PASSWORD) {
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
    caricaCorse();
  } else {
    document.getElementById("erroreLogin").innerHTML = "❌ PASSWORD ERRATA";
    document.getElementById("erroreLogin").style.color = "red";
  }
}

function preparaAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === "suspended") audioCtx.resume();
}

function beep(freq, durata) {
  preparaAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.frequency.value = freq;
  gain.gain.value = 0.25;
  osc.start();
  osc.stop(audioCtx.currentTime + durata / 1000);
}

function cercaTicketAnnulla() {
  const ticket = document.getElementById("ticketAnnulla").value.trim();

  if (ticket === "") {
    alert("Inserisci il numero ticket");
    return;
  }

  const callbackName = "trova_" + Date.now();

  window[callbackName] = function(d) {
    delete window[callbackName];

    if (d.esito === "TROVATO") {
      ticketDaAnnullare = d.ticket;

      document.getElementById("annullaDettagli").innerHTML =
        "⚠️ CONFERMA ANNULLAMENTO<br><br>" +
        "<span class='nomeGrande'>" + (d.nome || "") + " " + (d.cognome || "") + "</span><br>" +
        "<span class='info'>Passeggeri: " + (d.pax || "") + "</span><br>" +
        "<span class='info'>Ticket: " + (d.ticket || "") + "</span><br>" +
        "<span class='info'>Corsa: " + (d.corsa || "") + "</span>";

      document.getElementById("confermaAnnullaBtn").style.display = "inline-block";
      return;
    }

    ticketDaAnnullare = "";
    document.getElementById("confermaAnnullaBtn").style.display = "none";

    if (d.esito === "NON_IMBARCATO") {
      document.getElementById("annullaDettagli").innerHTML =
        "❌ TICKET NON RISULTA IMBARCATO<br><br>" +
        (d.nome || "") + " " + (d.cognome || "") + "<br>" +
        "Pax: " + (d.pax || "") + "<br>" +
        "Ticket: " + (d.ticket || "");
      return;
    }

    if (d.esito === "ALTRA_CORSA") {
      document.getElementById("annullaDettagli").innerHTML =
        "❌ TICKET DI ALTRA CORSA<br><br>" +
        "Corsa biglietto: " + (d.corsa || "") + "<br>" +
        "Corsa selezionata: " + corsaAttiva;
      return;
    }

    if (d.esito === "ANNULLATO") {
      document.getElementById("annullaDettagli").innerHTML =
        "❌ BIGLIETTO ANNULLATO";
      return;
    }

    if (d.esito === "PORTO_NON_PREVISTO") {
      document.getElementById("annullaDettagli").innerHTML =
        "❌ PORTO NON PREVISTO PER QUESTO BIGLIETTO<br><br>" +
        "Porto selezionato: " + portoCheckinAttivo;
      return;
    }

    document.getElementById("annullaDettagli").innerHTML =
      "❌ TICKET NON TROVATO";
  };

  const script = document.createElement("script");
  script.src = API_URL
    + "?azione=trovaTicket"
    + "&ticket=" + encodeURIComponent(ticket)
    + "&corsa=" + encodeURIComponent(corsaAttiva)
    + "&portoCheckin=" + encodeURIComponent(portoCheckinAttivo)
    + "&callback=" + callbackName;

  document.body.appendChild(script);
}

function confermaAnnullaCheckin() {
  if (ticketDaAnnullare === "") {
    alert("Nessun ticket selezionato");
    return;
  }

  if (!confirm("Confermi annullamento check-in del ticket " + ticketDaAnnullare + " ?")) {
    return;
  }

  const callbackName = "annulla_" + Date.now();

  window[callbackName] = function(d) {

    + "&callback=" + callbackName;

  document.body.appendChild(script);
}




function chiamaApi(params, callback) {
  const callbackName = "api_" + Date.now() + "_" + Math.random().toString(36).substring(2);
  params.callback = callbackName;

  window[callbackName] = function(d) {
    delete window[callbackName];
    if (callback) callback(d);
  };

  const script = document.createElement("script");
  script.onerror = function() {
    delete window[callbackName];
    if (callback) callback({ esito: "ERRORE_COLLEGAMENTO" });
  };

  script.src = API_URL + "?" + new URLSearchParams(params).toString();
  document.body.appendChild(script);
}

        "<h2>📊 STORICO CORSE</h2><p style='text-align:center'>Storico non disponibile.</p>";

    let html = "<h2>📊 STORICO CORSE</h2>";
    html += "<p style='text-align:center'><b>Ultime 50 corse chiuse</b></p>";

    if (!d.storico || d.storico.length === 0) {
      html += "<p style='text-align:center'>Nessuna corsa nello storico.</p>";
    } else {
      for (let i = 0; i < d.storico.length; i++) {
        const r = d.storico[i];

        html +=
          "<div class='storicoCard'>" +
          "<div class='storicoTitolo'>" + (r.dataOra || "") + "<br>" + (r.corsa || "") + "</div>" +
          "<div class='storicoDettagli'>" +
          "<b>Totale:</b> " + (r.totale || 0) +
          " &nbsp; <b>Imbarcati:</b> " + (r.imbarcati || 0) + "<br>" +
          "<b>Mancanti:</b> " + (r.mancanti || 0) +
          " &nbsp; <b>Annullati:</b> " + (r.annullati || 0) + "<br><br>" +
          "<b>Adulti:</b> " + (r.adultiTotale || 0) +
          " &nbsp; <b>Bambini:</b> " + (r.bambiniTotale || 0) +
          " &nbsp; <b>Infant:</b> " + (r.infantTotale || 0) + "<br>" +
          "<b>Operatore:</b> " + (r.operatore || "-") + "<br>" +
          "<b>Porto check-in:</b> " + (r.portoCheckin || "-") +
          "</div>" +
          "<button onclick=\"eliminaStorico(" + r.riga + ")\">🗑️ CANCELLA DALLO STORICO</button>" +
          "</div>";
      }
    }

    document.getElementById("storicoBox").innerHTML = html;
  });

  }

  corsaChiusa = true;
  bloccato = true;

  if (timerRiavvio) clearTimeout(timerRiavvio);
  if (timerStats) clearInterval(timerStats);

  aggiornaStatistiche();

  setTimeout(function() {
    salvaStoricoCorsa(function(resStorico) {
      let msg = creaTestoReport();

      if (resStorico && resStorico.esito === "STORICO_SALVATO") {
        msg += "\n\n✅ Storico imbarchi salvato";
      } else {
        msg += "\n\n⚠️ Storico non salvato: verifica connessione";
      }

      alert(msg);

      if (scanner) {
        scanner.clear();
      }

      document.getElementById("reader").innerHTML = "";
      document.getElementById("reader").style.display = "none";
      document.getElementById("manualBox").style.display = "none";
      document.getElementById("menuBtn").style.display = "none";
      document.getElementById("menuOperazioni").style.display = "none";
      document.getElementById("listaBox").style.display = "none";
      document.getElementById("chiudiListaBtn").style.display = "none";
      document.getElementById("dettaglioStatsBox").style.display = "none";
      document.getElementById("tornaStatsBtn").style.display = "none";
      document.getElementById("storicoBox").style.display = "none";
      document.getElementById("tornaStoricoBtn").style.display = "none";
      document.getElementById("annullaBox").style.display = "none";
      document.getElementById("nuovaCorsaBtn").style.display = "inline-block";

      document.body.style.background = "#e0e0e0";
      document.documentElement.style.background = "#e0e0e0";

      document.getElementById("esito").innerHTML = "🛑 CORSA CHIUSA";
      document.getElementById("dettagli").innerHTML =
        corsaAttiva + "<br>Porto check-in: " + portoCheckinAttivo + "<br><br>" +
        "Imbarcati: " + (ultimoReport ? ultimoReport.imbarcati : "") + "<br>" +
        "Mancanti: " + (ultimoReport ? ultimoReport.mancanti : "") + "<br>" +
        "Annullati: " + (ultimoReport ? ultimoReport.annullati : "");
    });
  }, 700);
}


function nuovaCorsa() {
  document.body.classList.remove("risultatoAttivo");

  corsaChiusa = false;
  bloccato = false;
  ultimoReport = null;

  if (timerRiavvio) clearTimeout(timerRiavvio);
  if (timerStats) clearInterval(timerStats);

  document.body.style.background = "white";
  document.documentElement.style.background = "white";

  document.getElementById("esito").style.display = "block";
  document.getElementById("dettagli").style.display = "block";

  document.getElementById("operatore").style.display = "block";
  document.getElementById("corsa").style.display = "block";
  document.getElementById("portoCheckin").style.display = "block";
  document.getElementById("startBtn").style.display = "inline-block";
  document.getElementById("storicoBtn").style.display = "inline-block";
  document.getElementById("setupBox").style.display = "block";

  document.getElementById("manualBox").style.display = "none";
  document.getElementById("menuBtn").style.display = "none";
  document.getElementById("menuOperazioni").style.display = "none";
  document.getElementById("reader").style.display = "none";
  document.getElementById("statsBox").style.display = "none";
  document.getElementById("listaBox").style.display = "none";
  document.getElementById("chiudiListaBtn").style.display = "none";
  document.getElementById("dettaglioStatsBox").style.display = "none";
  document.getElementById("tornaStatsBtn").style.display = "none";
  document.getElementById("storicoBox").style.display = "none";
  document.getElementById("tornaStoricoBtn").style.display = "none";
  document.getElementById("annullaBox").style.display = "none";
  document.getElementById("nuovaCorsaBtn").style.display = "none";

  document.getElementById("codiceManuale").value = "";
  document.getElementById("operatore").value = "";
  document.getElementById("corsa").value = "";
  document.getElementById("portoCheckin").innerHTML = "<option value=''>Seleziona porto check-in</option>";
  portoCheckinAttivo = "";

  document.getElementById("esito").innerHTML =
    "INSERISCI OPERATORE E CORSA";

  document.getElementById("dettagli").innerHTML = "";

  caricaCorse();
}

function verifica(codice) {
  if (corsaChiusa) return;

  document.body.classList.remove("risultatoAttivo");
  preparaAudio();

  if (bloccato) return;
  bloccato = true;

  document.body.style.background = "white";
  document.documentElement.style.background = "white";
  document.getElementById("esito").innerHTML = "CONTROLLO...";
  document.getElementById("dettagli").innerHTML = codice;
  document.getElementById("listaBox").style.display = "none";
  document.getElementById("chiudiListaBtn").style.display = "none";
  document.getElementById("dettaglioStatsBox").style.display = "none";
  document.getElementById("tornaStatsBtn").style.display = "none";
  document.getElementById("storicoBox").style.display = "none";
  document.getElementById("tornaStoricoBtn").style.display = "none";
  document.getElementById("annullaBox").style.display = "none";

  if (scanner) scanner.clear();

  const callbackName = "riceviRisposta_" + Date.now();

  window[callbackName] = function(d) {
    delete window[callbackName];

    if (d.esito === "VALIDO") {
      beepValido();
      aggiornaStatistiche();

      mostra(
        "✅ IMBARCO OK",
        "#00c853",
        "<span class='nomeGrande'>" + (d.nome || "") + " " + (d.cognome || "") + "</span><br>" +
        "<span class='info'>Pax: " + (d.pax || "") + "</span><br>" +
        "<span class='info'>Ticket: " + (d.ticket || "") + "</span><br>" +
        "<span class='info'>Corsa: " + (d.corsa || "") + "</span><br>" +
        "<span class='info'>Operatore: " + operatoreAttivo + "</span>"
      );
      return;
    }

    if (d.esito === "ALTRA_CORSA") {
      beepErrore();
      mostra(
        "❌ ALTRA CORSA",
        "#ff1744",
        "Corsa biglietto: " + (d.corsa || "") + "<br>" +
        "Corsa selezionata: " + corsaAttiva
      );
      return;
    }

    if (d.esito === "ANNULLATO") {
      beepErrore();
      mostra("❌ BIGLIETTO ANNULLATO", "#ff1744");
      return;
    }

    if (d.esito === "GIA_USATO") {
      beepGiaUsato();
      mostra("⚠️ GIÀ UTILIZZATO", "#ffd600");
      return;
    }

    if (d.esito === "NO_CODICE") {
      beepErrore();
      mostra("❌ CODICE MANCANTE", "#ff1744");
      return;
    }
    if (d.esito === "NO_PORTO") {
      beepErrore();
      mostra("❌ PORTO CHECK-IN MANCANTE", "#ff1744", "Seleziona il porto check-in e riprova");
      return;
    }


    if (d.esito === "PORTO_NON_PREVISTO") {
      beepErrore();
      mostra(
        "❌ PORTO NON PREVISTO",
        "#ff1744",
        "Questo biglietto non prevede check-in a " + portoCheckinAttivo
      );
      return;
    }

    beepErrore();
    mostra("❌ NON TROVATO", "#ff1744");
  };

  const script = document.createElement("script");
  script.src = API_URL
    + "?codice=" + encodeURIComponent(codice)
    + "&corsa=" + encodeURIComponent(corsaAttiva)
    + "&operatore=" + encodeURIComponent(operatoreAttivo)
    + "&portoCheckin=" + encodeURIComponent(portoCheckinAttivo)
    + "&callback=" + callbackName;

  script.onerror = function() {
    beepErrore();
    mostra("❌ ERRORE COLLEGAMENTO", "#ff1744", "Apps Script non raggiungibile");
  };

  document.body.appendChild(script);
}

function avviaScanner() {
  if (corsaChiusa) return;

  document.body.classList.remove("risultatoAttivo");
  document.body.style.background = "white";
  document.documentElement.style.background = "white";
  document.getElementById("reader").style.display = "block";

  document.getElementById("esito").innerHTML =
    "SCANNER ATTIVO<br><small>" + corsaAttiva + "</small><br><small>Porto check-in: " + portoCheckinAttivo + "</small><br><small>Operatore: " + operatoreAttivo + "</small>";

  document.getElementById("dettagli").innerHTML = "";
  document.getElementById("reader").innerHTML = "";
  bloccato = false;

  scanner = new Html5QrcodeScanner("reader", {
    fps: 10,
    qrbox: 250
  });

  scanner.render(function(decodedText) {
    verifica(decodedText);
  });
}

function riavviaAutomatico() {
  if (corsaChiusa) return;

  timerRiavvio = setTimeout(function() {
    aggiornaStatistiche();
    avviaScanner();
  }, 2000);
}
</script>
